syntax = "proto3";
package recall.registry.v1;

import "google/protobuf/timestamp.proto";
import "common.proto";
import "memory/memory-v1.proto";

option go_package = "github.com/KZN-Labs/Recall-/gen/go/recall/registry/v1;registryv1";

// The on-Walrus representation of a published agent memory profile.
// `publish_registry` encodes this struct as the blob bytes; `import_registry`
// fetches the blob and decodes it back. Contains both the profile metadata
// (queryable via the registry index) and the actual memory entries that
// reproduce the source workspace.
message RegistryPackage {
  RegistryProfile profile = 1;
  repeated recall.memory.v1.MemoryEntry entries = 2;
  // Reserved for future schema migrations. Always "v1" today.
  string format_version = 3;
}

// A published agent memory profile in the registry.
message RegistryProfile {
  string name = 1;
  string version = 2;
  string author = 3;
  string category = 4;
  string description = 5;
  int64 memory_count = 6;
  int64 artifact_count = 7;
  int64 import_count = 8;
  string recommended_system_prompt = 9;
  WorkspaceConfig workspace_config = 10;
  recall.common.v1.WalrusBlobRef walrus_blob = 11;
  google.protobuf.Timestamp published_at = 12;
  // Once published, profiles are immutable.
  bool immutable = 13;
  ComponentBlobIds component_blob_ids = 14;
  // Cryptographic publisher identity — Ed25519 passport that signed the publish.
  string publisher_passport_id = 15;
  // Who can import this profile.
  RegistryVisibility visibility = 16;
}

// Who can call `POST /registry/:name/:version/import` for this profile.
//
// PUBLIC (default) — anyone holding the profile name + version can import.
//   Matches npm / PyPI / Docker Hub public-package semantics. The publish
//   signature is what guarantees authorship; discoverability is the feature.
//
// RESTRICTED — the importer must hold a passport that has been granted
//   import capability by the publisher. (Grant flow + Seal-encrypted blob
//   are tracked separately; today RESTRICTED profiles refuse all imports
//   with HTTP 501 so this enum value can be set without surprising callers.)
enum RegistryVisibility {
  REGISTRY_VISIBILITY_PUBLIC     = 0;
  REGISTRY_VISIBILITY_RESTRICTED = 1;
}

message WorkspaceConfig {
  int32 suggested_trust_level = 1;
  recall.common.v1.AgentRole suggested_role = 2;
  string constitution_version = 3;
}

message ComponentBlobIds {
  string memory_entries = 1;
  string workflow_artifacts = 2;
  string system_prompt = 3;
  string workspace_config = 4;
}

message PublishRequest {
  string name = 1;
  string version = 2;
  string description = 3;
  // Passport ID of the publishing agent.
  recall.common.v1.Hash passport_id = 4;
  recall.common.v1.WorkspaceId source_workspace_id = 5;
  recall.common.v1.Signature signature = 6;
}

message PublishResponse {
  RegistryProfile profile = 1;
  recall.common.v1.Hash receipt_id = 2;
}

message ImportRequest {
  string name = 1;
  string version = 2;
  recall.common.v1.WorkspaceId target_workspace_id = 3;
  recall.common.v1.Hash passport_id = 4;
}

message ImportResponse {
  RegistryProfile profile = 1;
  recall.common.v1.Hash receipt_id = 2;
}

message ListProfilesRequest {
  string category = 1;
  string name_prefix = 2;
  int32 page_size = 3;
  string page_token = 4;
}

message ListProfilesResponse {
  repeated RegistryProfile profiles = 1;
  string next_page_token = 2;
}
