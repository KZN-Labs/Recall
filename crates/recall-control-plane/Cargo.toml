[package]
name = "recall-control-plane"
version.workspace = true
edition.workspace = true
rust-version.workspace = true

[[bin]]
name = "recall-control-plane"
path = "src/main.rs"

[dependencies]
recall-core = { path = "../recall-core" }
recall-proto = { path = "../recall-proto" }
recall-crypto = { path = "../recall-crypto" }
recall-passport = { path = "../recall-passport" }
recall-capability = { path = "../recall-capability" }
