sui-anchor       = { path = "../../backends/sui-anchor" }
walrus-memory    = { path = "../../backends/walrus-memory" }
seal-encryption  = { path = "../../backends/seal-encryption" }
recall-transport = { path = "../recall-transport" }
tokio = { workspace = true }
tonic = { workspace = true }
prost = { workspace = true }
